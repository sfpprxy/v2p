name: Podcast Pages

on:
  push:
    branches:
      - main
    paths:
      - "podcast.config.json"
      - "podcast/episodes/**"
      - "avatar-xiaoyuzhou-cover.jpg"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: podcast-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - run: bun install --frozen-lockfile

      - run: bun run podcast:build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: podcast/site

      - id: deployment
        uses: actions/deploy-pages@v4
